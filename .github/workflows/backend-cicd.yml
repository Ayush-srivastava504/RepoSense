name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - "services/api/**"
      - "infrastructure/docker/**"
      - ".github/workflows/backend-cicd.yml"
      - "tests/**"

  pull_request:
    branches: [master]
    paths:
      - "services/api/**"
      - "tests/**"

  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target environment (production / staging)"
        required: false
        default: "production"

  schedule:
    - cron: "*/15 * * * *"

jobs:
  test:
    name: Run Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: internship_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: services/api

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internship_db_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-key-32-chars-long!!
      GITHUB_CLIENT_ID: ci-fake-client-id
      GITHUB_CLIENT_SECRET: ci-fake-client-secret
      GITHUB_REDIRECT_URI: http://localhost:3000/api/github/callback
      GITHUB_TOKEN_ENCRYPTION_KEY: dGVzdGtleS10ZXN0a2V5LXRlc3RrZXktdGVzdA==
      FRONTEND_URL: http://localhost:3000
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run database migrations
        run: python run_migrations.py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internship_db_test

      - name: Run import smoke test
        run: python test_imports.py

      - name: Run pytest with coverage
        run: |
          pytest ../../tests/ \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/api/coverage.xml

  deploy:
    name: Deploy to EC2
    needs: test
    if: >
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            echo "Connected to EC2 instance"
            echo "Hostname: $(hostname)"

            cd /home/ec2-user/RepoSense

            echo "Pulling latest code..."
            git pull

            echo "Building and deploying containers..."
            docker compose -f infrastructure/docker/docker-compose.yml up -d --build api

            echo "Waiting for API to be healthy..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✓ API is healthy (attempt $i)"
                exit 0
              fi
              echo "  attempt $i: got $STATUS, retrying in 10s..."
              sleep 10
            done
            echo "ERROR: API did not become healthy after 120s"
            exit 1

  smoke:
    name: Post-Deploy Smoke Test
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Health check — all services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          script: |
            set -e
            check() {
              NAME=$1; URL=$2
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✓ $NAME"
              else
                echo "  ✗ $NAME returned $STATUS"
                exit 1
              fi
            }
            echo "Running smoke tests..."
            check "API Gateway"      "http://localhost:8000/health"
            check "Neural Generator" "http://localhost:8002/health"
            check "RAG Service"      "http://localhost:8001/health"
            echo "✓ All services healthy"

  health_monitor:
    name: Health Monitor
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install monitor dependencies
        run: pip install httpx aiofiles

      - name: Run health checks via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          script: |
            cd /home/ec2-user/RepoSense
            ALERT_WEBHOOK_URL="${{ secrets.ALERT_WEBHOOK }}" \
              python3 monitor.py 2>/dev/null || echo "Monitor script not found"

      - name: Alert on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.ALERT_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.ALERT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d '{"text":" RepoSense health-monitor job FAILED — check GitHub Actions."}'
          fi